<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro de Funcionário</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #0f2027;
    color: #fff;
}

.card {
    background: #fff;
    border-radius: 12px;
    border: none;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    color: #000;
}

.card-title {
    color: #026b75;
    font-weight: bold;
}

.form-control, .form-select {
    border: 1px solid #026b75;
}

.form-control:focus, .form-select:focus {
    border-color: #00e7fc;
    box-shadow: 0 0 6px #00e7fc;
}

.btn-main {
    background: #00e7fc;
    color: #000;
    font-weight: bold;
}

.btn-main:hover {
    background: #047aa5;
    color: #fff;
}

h1 {
    color: #00e7fc;
    text-align: center;
}

/* esconder etapas */
.step {
    display: none;
}

.step.active {
    display: block;
}
</style>
</head>

<body>

<div class="container py-4">

<h1>Cadastro de Funcionário</h1>

<form>

<!-- ETAPA 1 -->
<div class="step active">
    <div class="card p-3 mb-4">
        <h5 class="card-title">Dados Pessoais</h5>

        <label>Nome Completo</label>
        <input type="text" class="form-control mb-2">

        <label>Email</label>
        <input type="email" class="form-control mb-2">

        <label>CPF</label>
        <input type="text" class="form-control mb-2">

        <label>Telefone</label>
        <input type="text" class="form-control mb-2">

        <label>Data de Nascimento</label>
        <input type="date" class="form-control mb-2">
    </div>

    <div class="text-end">
        <button type="button" class="btn btn-main" onclick="nextStep()">Avançar</button>
    </div>
</div>

<!-- ETAPA 2 -->
<div class="step">
    <div class="card p-3 mb-4">
        <h5 class="card-title">Dados Profissionais</h5>

        <label>Cargo</label>
        <input type="text" class="form-control mb-2">

        <label>Setor</label>
        <select class="form-select mb-2">
            <option>Estoque</option>
            <option>Farmácia</option>
            <option>Logística</option>
            <option>Administração</option>
        </select>

        <label>Data de Admissão</label>
        <input type="date" class="form-control mb-2">

        <label>Turno</label>
        <select class="form-select mb-2">
            <option>Manhã</option>
            <option>Tarde</option>
            <option>Noite</option>
        </select>

        <label>Salário (R$)</label>
        <input type="number" class="form-control mb-2">
    </div>

    <div class="d-flex justify-content-between">
        <button type="button" class="btn btn-secondary" onclick="prevStep()">Voltar</button>
        <button type="button" class="btn btn-main" onclick="nextStep()">Avançar</button>
    </div>
</div>

<!-- ETAPA 3 -->
<div class="step">
    <div class="card p-3 mb-4">
        <h5 class="card-title">Acesso ao Sistema</h5>

        <label>Usuário</label>
        <input type="text" class="form-control mb-2">

        <label>Senha</label>
        <input type="password" class="form-control mb-2">
    </div>

    <div class="d-flex justify-content-between">
        <button type="button" class="btn btn-secondary" onclick="prevStep()">Voltar</button>
        <button type="submit" class="btn btn-main">Finalizar Cadastro</button>
    </div>
</div>

</form>

</div>

<script>
let currentStep = 0;
const steps = document.querySelectorAll(".step");

function showStep(index) {
    steps.forEach((step, i) => {
        step.classList.remove("active");
        if (i === index) step.classList.add("active");
    });
}

function nextStep() {
    if (currentStep < steps.length - 1) {
        currentStep++;
        showStep(currentStep);
    }
}

function prevStep() {
    if (currentStep > 0) {
        currentStep--;
        showStep(currentStep);
    }
}
</script>

</body>
</html>
