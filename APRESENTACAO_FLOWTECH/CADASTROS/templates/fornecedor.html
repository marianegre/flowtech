{% extends 'formulario_fornecedor.html' %}

{% block conteudo %}

<div class="mb-4 animate__animated animate__fadeIn">
    <div class="d-flex align-items-center">
        <div class="icon-box me-3"
            style="background: var(--secondary-color); color: white; padding: 12px; border-radius: 12px;">
            <i class="bi bi-people-fill fs-4"></i>
        </div>
        <div>
            <h2 class="titulo-pagina mb-0" style="color: #fff; font-weight: 700; letter-spacing: 1px;">
                {{ 'Editar' if fornecedor else 'Cadastrar' }} Fornecedor
            </h2>
            <p class="text-white-50 mb-0">Gestão de parceiros farmacêuticos e logística</p>
        </div>
    </div>
</div>

<div class="card shadow-lg border-0 animate__animated animate__fadeInUp"
    style="border-radius: 15px; background: rgba(255, 255, 255, 0.98);">
    <div class="card-body p-4 p-md-5">

        <form method="POST" action="{{ url_for('salvar_fornecedor') }}">
            <div class="row g-4">
                <div class="col-12 mb-2">
                    <h5 class="text-primary fw-bold"
                        style="font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px;">
                        <i class="bi bi-info-circle me-2"></i>Identificação da Empresa
                    </h5>
                    <hr class="mt-1 opacity-10">
                </div>

                <div class="col-md-7">
                    <label class="form-label fw-bold">Razão Social / Nome Fantasia</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-building"></i></span>
                        <input type="text" name="nome" class="form-control border-start-0"
                            value="{{ fornecedor.nome if fornecedor else '' }}"
                            placeholder="Ex: Laboratório MedTech S.A." required>
                    </div>
                </div>

                <div class="col-md-5">
                    <label class="form-label fw-bold">CNPJ</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-card-text"></i></span>
                        <input type="text" name="cnpj" class="form-control border-start-0"
                            value="{{ fornecedor.cnpj if fornecedor else '' }}" placeholder="00.000.000/0000-00">
                    </div>
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-bold">E-mail de Contato</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope-at"></i></span>
                        <input type="email" name="email" class="form-control border-start-0"
                            value="{{ fornecedor.e_mail if fornecedor else '' }}"
                            placeholder="comercial@fornecedor.com.br">
                    </div>
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-bold">Telefone / WhatsApp</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-whatsapp"></i></span>
                        <input type="text" name="telefone" class="form-control border-start-0"
                            value="{{ fornecedor.telefone if fornecedor else '' }}" placeholder="(00) 00000-0000">
                    </div>
                </div>

                <div class="col-12 mt-4">
                    <label class="form-label fw-bold">Endereço Completo</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-geo-alt"></i></span>
                        <input type="text" name="endereco" class="form-control border-start-0"
                            value="{{ fornecedor.endereco if fornecedor else '' }}"
                            placeholder="Av. das Nações, 123 - Setor Industrial, São Paulo - SP">
                    </div>
                </div>

            </div>

            <div class="d-flex justify-content-between align-items-center mt-5 pt-3 border-top">
                <a href="{{ url_for('fornecedores') }}" class="btn btn-link text-decoration-none text-muted fw-bold">
                    <i class="bi bi-arrow-left"></i> Voltar para a lista
                </a>

                <div class="d-flex gap-3">
                    <button type="reset" class="btn btn-outline-danger px-4 rounded-pill">
                        <i class="bi bi-eraser"></i> Limpar
                    </button>
                    <button type="submit" class="btn btn-primary px-5 rounded-pill shadow-sm fw-bold"
                        style="background: var(--secondary-color); border: none;">
                        <i class="bi bi-check-lg me-2"></i>SALVAR DADOS
                    </button>
                </div>
            </div>

        </form>

    </div>
</div>

{% endblock %}
