<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Flow Tech</title>
    <link rel="stylesheet" href="tela_login.css">
    <!--Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!--Ícones -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Fonte moderna -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

    <div class="container-fluid h-100">
        <div class="row h-100">

            <!-- LADO ESQUERDO -->
            <div class="col-md-6 d-flex flex-column justify-content-center align-items-center left-side text-center">

                <img src="logosf-Photoroom.png" alt="logo" class="logo">

                <h1 class="fw-bold">Flow Tech</h1>
                <p class="mt-2">Gestão inteligente de estoque farmacêutico</p>
            </div>

            <!-- LADO DIREITO -->
            <div class="col-md-6 d-flex justify-content-center align-items-center right-side">

                <div class="login-card">

                    <h3 class="fw-bold">Bem-vindo de volta</h3>
                    <p class="text-muted mb-4">Acesse o painel de gestão farmacêutica</p>

                    <!-- Email -->
                    <div class="mb-3">
                        <div class="input-group">
                            <span class="input-group-text bg-white">
                                <i class="bi bi-envelope"></i>
                            </span>
                            <input type="email" class="form-control" placeholder="E-mail corporativo">
                        </div>
                    </div>

                    <!-- Senha -->
                    <div class="mb-3">
                        <div class="input-group">
                            <span class="input-group-text bg-white">
                                <i class="bi bi-lock"></i>
                            </span>
                            <input type="password" class="form-control" placeholder="Senha">
                            <span class="input-group-text bg-white">
                                <i class="bi bi-eye"></i>
                            </span>
                        </div>
                    </div>

                    <!-- Botão -->
                    <button class="btn btn w-100 mb-3">
                        Acessar sistema
                    </button>

                    <!-- Links -->
                    <div class="d-flex justify-content-between">
                        <a href="#" class="small-link">
                            <i class="bi bi-key"></i> Esqueci minha senha
                        </a>

                        <a href="#" class="small-link">
                            <i class="bi bi-question-circle"></i> Suporte
                        </a>
                    </div>

                </div>

                <!-- Segurança -->
                <div class="position-absolute bottom-0 mb-4 text-muted small">
                    <i class="bi bi-shield-lock"></i> Acesso seguro e criptografado
                </div>

            </div>

        </div>
    </div>

</body>

</html>
