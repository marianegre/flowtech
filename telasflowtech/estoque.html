<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle de Estoque</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #0f2027;
    color: #fff;
}

/* CARDS */
.card {
    background: #ffffff;
    border-radius: 12px;
    border: none;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}

.card-title {
    color: #026b75;
    font-weight: bold;
}

/* INPUT */
.form-control, .form-select {
    border: 1px solid #026b75;
}

.form-control:focus, .form-select:focus {
    border-color: #00e7fc;
    box-shadow: 0 0 6px #00e7fc;
}

/* BOTÕES */
.btn-main {
    background: #00e7fc;
    color: #000;
    font-weight: bold;
}

.btn-main:hover {
    background: #047aa5;
    color: #fff;
}

/* TÍTULO */
h1 {
    color: #00e7fc;
}
</style>
</head>

<body>

<div class="container py-4">

<h1 class="text-center mb-4">Controle de Estoque</h1>

<!-- BUSCA -->
<div class="card p-3 mb-4">
    <h5 class="card-title">Buscar Medicamento</h5>
    <div class="row g-3">
        <div class="col-md-5">
            <label>Lote</label>
            <input class="form-control">
        </div>
        <div class="col-md-5">
            <label>Rua</label>
            <input class="form-control">
        </div>
        <div class="col-md-2 d-flex align-items-end">
            <button class="btn btn-main w-100">Buscar</button>
        </div>
    </div>
</div>

<!-- INFO + STATUS -->
<div class="row">

<div class="col-md-6">
    <div class="card p-3 mb-4">
        <h5 class="card-title">Informações</h5>

        <label>Nome</label>
        <input class="form-control mb-2">

        <label>Fornecedor</label>
        <input class="form-control mb-2">

        <label>Cliente</label>
        <input class="form-control mb-2">
    </div>
</div>

<div class="col-md-6">
    <div class="card p-3 mb-4">
        <h5 class="card-title">Status</h5>

        <label>Quantidade</label>
        <input class="form-control mb-2">

        <label>Demanda</label>
        <select class="form-select mb-2">
            <option>Alta</option>
            <option>Média</option>
            <option>Baixa</option>
        </select>

        <label>Estado da Caixa</label>
        <select class="form-select">
            <option>Integra</option>
            <option>Avariada</option>
        </select>
    </div>
</div>

</div>

<!-- AÇÕES -->
<div class="row">

<div class="col-md-6">
    <div class="card p-3 mb-4">
        <h5 class="card-title">Saída</h5>

        <label>Quantidade</label>
        <input class="form-control mb-2">

        <button class="btn btn-main w-100">Confirmar Saída</button>
    </div>
</div>

<div class="col-md-6">
    <div class="card p-3 mb-4">
        <h5 class="card-title">Entrada</h5>

        <label>Quantidade</label>
        <input class="form-control mb-2">

        <button class="btn btn-main w-100">Confirmar Entrada</button>
    </div>
</div>

</div>

<!-- DATAS -->
<div class="card p-3 mb-4">
    <h5 class="card-title">Datas</h5>

    <div class="row">
        <div class="col-md-4">
            <label>Entrada</label>
            <input type="date" class="form-control">
        </div>

        <div class="col-md-4">
            <label>Saída</label>
            <input type="date" class="form-control">
        </div>

        <div class="col-md-4">
            <label>Validade</label>
            <input type="date" class="form-control">
        </div>
    </div>
</div>

</div>

</body>
</html>
