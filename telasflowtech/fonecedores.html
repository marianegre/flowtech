<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro de Fornecedor</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #0f2027;
    color: #fff;
}

.card {
    background: #fff;
    border-radius: 12px;
    border: none;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    color: #000;
}

.card-title {
    color: #026b75;
    font-weight: bold;
}

.form-control, .form-select {
    border: 1px solid #026b75;
}

.form-control:focus, .form-select:focus {
    border-color: #00e7fc;
    box-shadow: 0 0 6px #00e7fc;
}

.btn-main {
    background: #00e7fc;
    color: #000;
    font-weight: bold;
}

.btn-main:hover {
    background: #047aa5;
    color: #fff;
}

h1 {
    color: #00e7fc;
    text-align: center;
}
</style>
</head>

<body>

<div class="container my-4">

<h1 class="mb-4">Cadastro de Fornecedor</h1>

<!-- EMPRESA -->
<div class="card mb-4">
    <div class="card-body">
        <h5 class="card-title">Empresa</h5>

        <div class="row g-3">
            <div class="col-md-6">
                <label>Nome da Empresa</label>
                <input type="text" class="form-control">
            </div>

            <div class="col-md-6">
                <label>CNPJ</label>
                <input type="text" class="form-control">
            </div>

            <div class="col-md-6">
                <label>Telefone</label>
                <input type="text" class="form-control">
            </div>

            <div class="col-md-6">
                <label>E-mail</label>
                <input type="email" class="form-control">
            </div>

            <div class="col-12">
                <label>Localização</label>
                <input type="text" class="form-control">
            </div>
        </div>
    </div>
</div>

<!-- PRODUTO -->
<div class="card mb-4">
    <div class="card-body">
        <h5 class="card-title">Produto</h5>

        <div class="row g-3">
            <div class="col-md-6">
                <label>Nome</label>
                <input type="text" class="form-control">
            </div>

            <div class="col-md-6">
                <label>Quantidade</label>
                <input type="number" class="form-control">
            </div>

            <div class="col-md-6">
                <label>Lote</label>
                <input type="text" class="form-control">
            </div>

            <div class="col-md-6">
                <label>Validade</label>
                <input type="date" class="form-control">
            </div>
        </div>
    </div>
</div>

<!-- FUNCIONÁRIO -->
<div class="card mb-4">
    <div class="card-body">
        <h5 class="card-title">Funcionário Responsável</h5>

        <div class="row g-3">
            <div class="col-md-6">
                <label>Nome</label>
                <input type="text" class="form-control">
            </div>

            <div class="col-md-6">
                <label>CPF</label>
                <input type="text" class="form-control">
            </div>

            <div class="col-md-6">
                <label>E-mail</label>
                <input type="email" class="form-control">
            </div>

            <div class="col-md-6">
                <label>Senha</label>
                <input type="password" class="form-control">
            </div>

            <div class="col-md-6">
                <label>Telefone</label>
                <input type="text" class="form-control">
            </div>

            <div class="col-md-6">
                <label>Setor</label>
                <select class="form-select">
                    <option>Selecione</option>
                    <option>Estoque</option>
                    <option>Farmácia</option>
                    <option>Logística</option>
                </select>
            </div>

            <div class="col-12">
                <label>Identificação na Empresa</label>
                <input type="text" class="form-control">
            </div>
        </div>
    </div>
</div>

<!-- BOTÕES -->
<div class="text-end">
    <button class="btn btn-main">Cadastrar</button>
</div>

</div>

</body>
</html>
